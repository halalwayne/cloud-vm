name: Virtual Machine
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 1. Unlock Maximum Performance
        shell: pwsh
        run: |
          # Create folders
          New-Item -Path "C:\GamingVM\Backup" -ItemType Directory -Force
          New-Item -Path "C:\GamingVM\Startup" -ItemType Directory -Force
          
          # FORCE High Performance Power Plan for max CPU clock speed
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          
          # Disable all Windows animations to free up CPU for 60 FPS
          reg add "HKEY_CURRENT_USER\Control Panel\Desktop" /v UserPreferencesMask /t REG_BINARY /d 9012038010000000 /f
          
          # Install Visual C++ (Required for smooth app rendering)
          curl.exe -L -o vc_redist.x64.exe https://aka.ms/vs/17/release/vc_redist.x64.exe
          Start-Process ./vc_redist.x64.exe -ArgumentList "/install /quiet /norestart" -Wait
          
          # Install AnyDesk
          curl.exe -L -o anydesk.exe https://download.anydesk.com/AnyDesk.exe
          Start-Process ./anydesk.exe -ArgumentList "--install C:\AnyDesk --start-with-win --silent" -Wait

      - name: 2. Enable RDP + Create Public Tunnel
        shell: pwsh
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          # Enable Windows RDP
          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fDenyTSConnections" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Set login credentials
          net user runneradmin "GitHub@2026"
          net localgroup "Remote Desktop Users" "runneradmin" /add

          Write-Host "RDP Enabled"
          Write-Host "Username: runneradmin"
          Write-Host "Password: GitHub@2026"

          # Download ngrok (creates public address for your RDP)
          curl.exe -L -o ngrok.zip `
            https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip
          Expand-Archive ./ngrok.zip -DestinationPath C:\ngrok -Force

          # Start tunnel by passing the authtoken directly as an argument to bypass config path issues
          Start-Process C:\ngrok\ngrok.exe -ArgumentList "tcp 3389 --authtoken $env:NGROK_TOKEN" -WindowStyle Hidden
          
          # Retry loop waiting for ngrok API to spin up
          $attempts = 0
          $maxAttempts = 12
          $tunnel = $null
          
          while ($null -eq $tunnel -and $attempts -lt $maxAttempts) {
              try {
                  Start-Sleep -Seconds 3
                  $tunnel = Invoke-RestMethod http://localhost:4040/api/tunnels -ErrorAction Stop
              } catch {
                  $attempts++
                  Write-Host "Waiting for ngrok API to respond... (Attempt $attempts / $maxAttempts)"
              }
          }

          if ($null -eq $tunnel) {
              Write-Error "Ngrok failed to initialize. Double check that your NGROK_TOKEN secret is valid, has not expired, and isn't hitting active session limits."
              exit 1
          }

          # Get your public RDP address
          $rdpAddress = $tunnel.tunnels[0].public_url -replace "tcp://", ""

          $host_part = $rdpAddress.Split(":")[0]
          $port_part = $rdpAddress.Split(":")[1]

          Write-Host "=========================================="
          Write-Host "  RDP HOST : $host_part"
          Write-Host "  RDP PORT : $port_part"
          Write-Host "  USERNAME : runneradmin"
          Write-Host "  PASSWORD : GitHub@2026"
          Write-Host "=========================================="

      - name: 3. Restore & Boost System
        shell: pwsh
        run: |
          if (Test-Path "C:\GamingVM\Backup\System.reg") {
            reg import "C:\GamingVM\Backup\System.reg"
          }

      - name: 4. Session Info
        shell: pwsh
        run: |
          echo "GitHub@2026" | & "C:\AnyDesk\AnyDesk.exe" --set-password
          $idFile = "C:\ProgramData\AnyDesk\system.conf"
          $ID = ""
          while (!$ID) {
            if (Test-Path $idFile) {
              $ID = Select-String -Path $idFile -Pattern "ad.anynet.id=(.*)" | % { $_.Matches.Groups[1].Value }
            }
            Start-Sleep -Seconds 5
          }
          Write-Host "ANYDESK ID: $ID"
          while ($true) { Start-Sleep -Seconds 3600 }
