name: Virtual Machine
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 359

    steps:

      # ── STEP 0: Restore Everything ──────────────────────────────────────
      - name: 0. Restore Everything
        uses: actions/cache/restore@v4
        with:
          path: C:\GamingVM
          key: gaming-vm-files
          restore-keys: gaming-vm-files

      # ── STEP 1: Reinstall Apps From Backup ─────────────────────────────
      - name: 1. Reinstall Apps From Backup
        shell: pwsh
        run: |
          $7z = "C:\Program Files\7-Zip\7z.exe"
          if (-not (Test-Path $7z)) {
            Write-Host "7-Zip not found, installing via chocolatey..."
            choco install 7zip -y --no-progress
          }
          Write-Host "7-Zip ready at $7z"

          New-Item -Path "C:\GamingVM\Backups" -ItemType Directory -Force
          New-Item -Path "C:\GamingVM\Files"   -ItemType Directory -Force
          New-Item -Path "C:\GamingVM\MyApps"  -ItemType Directory -Force

          if (Test-Path "C:\GamingVM\Backups\ProgramFiles.7z") {
            Write-Host "Restoring installed apps..."
            & $7z x "C:\GamingVM\Backups\ProgramFiles.7z" -o"C:\Program Files\" -y
          }
          if (Test-Path "C:\GamingVM\Backups\ProgramFiles86.7z") {
            Write-Host "Restoring 32-bit apps..."
            & $7z x "C:\GamingVM\Backups\ProgramFiles86.7z" -o"C:\Program Files (x86)\" -y
          }
          if (Test-Path "C:\GamingVM\Backups\AppData.7z") {
            Write-Host "Restoring app settings..."
            & $7z x "C:\GamingVM\Backups\AppData.7z" -o"C:\Users\runneradmin\" -y
          }
          if (Test-Path "C:\GamingVM\Backups\ProgramData.7z") {
            Write-Host "Restoring ProgramData..."
            & $7z x "C:\GamingVM\Backups\ProgramData.7z" -o"C:\ProgramData\" -y
          }
          if (Test-Path "C:\GamingVM\Backups\Registry_HKLM.reg") {
            Write-Host "Restoring system registry..."
            reg import "C:\GamingVM\Backups\Registry_HKLM.reg" 2>&1 | Out-Null
          }
          if (Test-Path "C:\GamingVM\Backups\Registry_HKCU.reg") {
            Write-Host "Restoring user registry..."
            reg import "C:\GamingVM\Backups\Registry_HKCU.reg" 2>&1 | Out-Null
          }

          Write-Host "==============================="
          Write-Host "All apps and settings restored!"
          Write-Host "==============================="

      # ── STEP 2: Performance + AnyDesk + RDP + Ngrok ────────────────────
      - name: 2. Unlock Performance + Enable RDP + AnyDesk
        shell: pwsh
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          # ── Performance ──
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          reg add "HKEY_CURRENT_USER\Control Panel\Desktop" `
            /v UserPreferencesMask /t REG_BINARY /d 9012038010000000 /f

          # ── Visual C++ ──
          curl.exe -L -o vc_redist.x64.exe https://aka.ms/vs/17/release/vc_redist.x64.exe
          Start-Process ./vc_redist.x64.exe -ArgumentList "/install /quiet /norestart" -Wait

          # ── AnyDesk ──
          curl.exe -L -o anydesk.exe https://download.anydesk.com/AnyDesk.exe
          Start-Process ./anydesk.exe `
            -ArgumentList "--install C:\AnyDesk --start-with-win --silent" -Wait

          # ── Enable Windows RDP ──
          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user runneradmin "GitHub@2026"
          net localgroup "Remote Desktop Users" "runneradmin" /add
          Write-Host "RDP Enabled"

          # ── Ngrok tunnel for RDP ──
          curl.exe -L -o ngrok.zip `
            https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip
          Expand-Archive ./ngrok.zip -DestinationPath C:\ngrok -Force
          C:\ngrok\ngrok.exe config add-authtoken $env:NGROK_TOKEN
          Start-Process C:\ngrok\ngrok.exe -ArgumentList "tcp 3389" -WindowStyle Hidden

          # ── Wait for ngrok to be ready ──
          $tunnel = $null
          $tries = 0
          while ($tries -lt 20) {
            Start-Sleep -Seconds 3
            try {
              $tunnel = Invoke-RestMethod http://localhost:4040/api/tunnels -ErrorAction Stop
              if ($tunnel.tunnels.Count -gt 0) {
                Write-Host "Ngrok is ready!"
                break
              }
            } catch {
              Write-Host "Waiting for ngrok... attempt $tries"
            }
            $tries++
          }

          if (-not $tunnel -or $tunnel.tunnels.Count -eq 0) {
            Write-Host "Ngrok failed to start after 60 seconds!"
            exit 1
          }

          # ── Get public RDP address ──
          $rdpAddress = $tunnel.tunnels[0].public_url -replace "tcp://", ""
          $rdpHost    = $rdpAddress.Split(":")[0]
          $rdpPort    = $rdpAddress.Split(":")[1]

          "$rdpHost" | Set-Content "C:\GamingVM\rdp_host.txt"
          "$rdpPort" | Set-Content "C:\GamingVM\rdp_port.txt"

          Write-Host "=========================================="
          Write-Host "  RDP HOST : $rdpHost"
          Write-Host "  RDP PORT : $rdpPort"
          Write-Host "  USERNAME : runneradmin"
          Write-Host "  PASSWORD : GitHub@2026"
          Write-Host "=========================================="

      # ── STEP 3: Session Info + Keep Alive ───────────────────────────────
      - name: 3. Session Info & Keep Alive
        shell: pwsh
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo "GitHub@2026" | & "C:\AnyDesk\AnyDesk.exe" --set-password

          $idFile = "C:\ProgramData\AnyDesk\system.conf"
          $ID = ""
          while (!$ID) {
            if (Test-Path $idFile) {
              $ID = Select-String -Path $idFile -Pattern "ad.anynet.id=(.*)" |
                    ForEach-Object { $_.Matches.Groups[1].Value }
            }
            Start-Sleep -Seconds 5
          }

          $rdpHost = Get-Content "C:\GamingVM\rdp_host.txt" -ErrorAction SilentlyContinue
          $rdpPort = Get-Content "C:\GamingVM\rdp_port.txt" -ErrorAction SilentlyContinue

          Write-Host "=========================================="
          Write-Host "  RUN NUMBER : $env:RUN_NUMBER"
          Write-Host "  ANYDESK ID : $ID"
          Write-Host "  PASSWORD   : GitHub@2026"
          Write-Host "  RDP HOST   : $rdpHost"
          Write-Host "  RDP PORT   : $rdpPort"
          Write-Host "  USERNAME   : runneradmin"
          Write-Host "=========================================="

          # ── Keep alive with 10 min warning ──
          $cutoff = [DateTime]::Now.AddHours(5).AddMinutes(30)
          $warned = $false

          while ([DateTime]::Now -lt $cutoff) {
            if (!$warned -and ([DateTime]::Now -gt $cutoff.AddMinutes(-10))) {
              Write-Host "WARNING: 10 minutes until restart — save your work!"
              $warned = $true
            }
            Start-Sleep -Seconds 60
          }
          Write-Host "5.5 hrs reached — saving and restarting..."

      # ── STEP 4: Save Everything ──────────────────────────────────────────
      - name: 4. Save Everything
        if: always()
        shell: pwsh
        run: |
          $7z = "C:\Program Files\7-Zip\7z.exe"
          New-Item -Path "C:\GamingVM\Backups" -ItemType Directory -Force

          $excludeArgs = @(
            "-xr!WindowsApps",
            "-xr!Windows NT",
            "-xr!Internet Explorer",
            "-xr!Common Files\microsoft shared",
            "-xr!ModifiableWindowsApps"
          )

          Write-Host "Saving installed apps..."
          & $7z a -t7z "C:\GamingVM\Backups\ProgramFiles.7z" `
            "C:\Program Files\*" -mx=3 -mmt=on -y @excludeArgs

          Write-Host "Saving 32-bit apps..."
          & $7z a -t7z "C:\GamingVM\Backups\ProgramFiles86.7z" `
            "C:\Program Files (x86)\*" -mx=3 -mmt=on -y @excludeArgs

          Write-Host "Saving app settings..."
          & $7z a -t7z "C:\GamingVM\Backups\AppData.7z" `
            "C:\Users\runneradmin\AppData\*" `
            -mx=3 -mmt=on -y `
            -xr!"Temp" -xr!"Local\Temp" -xr!"cache" -xr!"Cache"

          Write-Host "Saving ProgramData..."
          & $7z a -t7z "C:\GamingVM\Backups\ProgramData.7z" `
            "C:\ProgramData\*" `
            -mx=3 -mmt=on -y `
            -xr!"Microsoft" -xr!"Windows" -xr!"USOPrivate"

          Write-Host "Saving registry..."
          reg export "HKLM\SOFTWARE" `
            "C:\GamingVM\Backups\Registry_HKLM.reg" /y 2>&1 | Out-Null
          reg export "HKCU" `
            "C:\GamingVM\Backups\Registry_HKCU.reg" /y 2>&1 | Out-Null

          Write-Host "======= Backup Sizes ======="
          Get-ChildItem "C:\GamingVM\Backups\" | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Host "$($_.Name) = $size MB"
          }
          Write-Host "============================"

      # ── STEP 5: Upload Cache ─────────────────────────────────────────────
      - name: 5. Upload Cache for Next Run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: C:\GamingVM
          key: gaming-vm-files-${{ github.run_number }}

      # ── STEP 6: Auto Restart ─────────────────────────────────────────────
      - name: 6. Auto-Restart Workflow
        if: always()
        shell: pwsh
        env:
          GH_TOKEN:      ${{ secrets.GH_TOKEN }}
          REPO:          ${{ github.repository }}
          WORKFLOW_FILE: vm.yml
          BRANCH:        main
        run: |
          $uri     = "https://api.github.com/repos/$env:REPO/actions/workflows/$env:WORKFLOW_FILE/dispatches"
          $headers = @{
            "Authorization" = "token $env:GH_TOKEN"
            "Accept"        = "application/vnd.github.v3+json"
          }
          $body = @{ ref = $env:BRANCH } | ConvertTo-Json

          try {
            Invoke-RestMethod -Uri $uri -Method POST -Headers $headers `
              -Body $body -ContentType "application/json"
            Write-Host "New run triggered successfully"
          } catch {
            Write-Host "Failed to trigger: $_"
          }
