name: Virtual Machine
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 359

    steps:

      - name: 0. Restore Everything
        uses: actions/cache/restore@v4
        with:
          path: C:\GamingVM
          key: gaming-vm-files
          restore-keys: gaming-vm-files

      - name: 1. Reinstall Apps From Backup
        shell: pwsh
        run: |
          $7z = "C:\Program Files\7-Zip\7z.exe"
          New-Item -Path "C:\GamingVM\Backups" -ItemType Directory -Force
          New-Item -Path "C:\GamingVM\Files"   -ItemType Directory -Force
          New-Item -Path "C:\GamingVM\MyApps"  -ItemType Directory -Force

          if (Test-Path "C:\GamingVM\Backups\MyApps.7z") {
            & $7z x "C:\GamingVM\Backups\MyApps.7z" -o"C:\" -y
          }
          if (Test-Path "C:\GamingVM\Backups\AppData.7z") {
            & $7z x "C:\GamingVM\Backups\AppData.7z" -o"C:\Users\runneradmin\" -y
          }
          if (Test-Path "C:\GamingVM\Backups\Desktop.7z") {
            & $7z x "C:\GamingVM\Backups\Desktop.7z" -o"C:\Users\runneradmin\Desktop\" -y
          }
          if (Test-Path "C:\GamingVM\Backups\Documents.7z") {
            & $7z x "C:\GamingVM\Backups\Documents.7z" -o"C:\Users\runneradmin\Documents\" -y
          }
          Write-Host "Done restoring!"

      - name: 2. Setup RDP + Ngrok
        shell: pwsh
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}
        run: |
          # ── Performance ──
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

          # ── Enable RDP ──
          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
            -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty `
            -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" `
            -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user runneradmin "Github2026"
          net localgroup "Remote Desktop Users" "runneradmin" /add
          Write-Host "RDP Enabled!"

          # ── Download Ngrok ──
          Write-Host "Downloading Ngrok..."
          curl.exe -L -o C:\ngrok.zip `
            https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip
          Expand-Archive C:\ngrok.zip -DestinationPath C:\ngrok -Force
          Write-Host "Ngrok ready! Size: $((Get-Item C:\ngrok\ngrok.exe).Length) bytes"

          # ── Auth and start ngrok ──
          C:\ngrok\ngrok.exe config add-authtoken $env:NGROK_TOKEN
          Start-Process C:\ngrok\ngrok.exe `
            -ArgumentList "tcp 3389 --log=C:\ngrok\ngrok.log" `
            -WindowStyle Hidden

          # ── Wait for ngrok API ──
          $rdpHost = $null
          $rdpPort = $null
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 3
            try {
              $res = Invoke-RestMethod http://localhost:4040/api/tunnels -ErrorAction Stop
              if ($res.tunnels.Count -gt 0) {
                $addr = $res.tunnels[0].public_url -replace "tcp://",""
                $rdpHost = $addr.Split(":")[0]
                $rdpPort = $addr.Split(":")[1]
                Write-Host "Ngrok tunnel ready!"
                break
              }
            } catch {
              Write-Host "Waiting for ngrok API... attempt $i"
            }
          }

          if (-not $rdpHost) {
            Write-Host "=== NGROK LOG ==="
            Get-Content "C:\ngrok\ngrok.log" -ErrorAction SilentlyContinue | Select-Object -Last 20
            Write-Host "================="
            exit 1
          }

          "$rdpHost" | Set-Content "C:\GamingVM\rdp_host.txt"
          "$rdpPort" | Set-Content "C:\GamingVM\rdp_port.txt"

          Write-Host "=========================================="
          Write-Host " >> LG TV - Remote PC Settings <<"
          Write-Host "  PC ADDRESS : $rdpHost"
          Write-Host "  PORT       : $rdpPort"
          Write-Host "  USERNAME   : runneradmin"
          Write-Host "  PASSWORD   : Github2026"
          Write-Host "=========================================="

      - name: 3. Keep Alive
        shell: pwsh
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          $rdpHost = Get-Content "C:\GamingVM\rdp_host.txt" -ErrorAction SilentlyContinue
          $rdpPort = Get-Content "C:\GamingVM\rdp_port.txt" -ErrorAction SilentlyContinue

          Write-Host "=========================================="
          Write-Host " RUN        : $env:RUN_NUMBER"
          Write-Host " >> LG TV - Remote PC Settings <<"
          Write-Host "  PC ADDRESS : $rdpHost"
          Write-Host "  PORT       : $rdpPort"
          Write-Host "  USERNAME   : runneradmin"
          Write-Host "  PASSWORD   : Github2026"
          Write-Host "=========================================="

          $cutoff = [DateTime]::Now.AddHours(5).AddMinutes(30)
          $warned = $false
          while ([DateTime]::Now -lt $cutoff) {
            if (!$warned -and ([DateTime]::Now -gt $cutoff.AddMinutes(-10))) {
              Write-Host "WARNING: 10 minutes left — save your work!"
              $warned = $true
            }
            Start-Sleep -Seconds 60
          }
          Write-Host "Time up — saving and restarting..."

      - name: 4. Save Everything
        if: always()
        shell: pwsh
        run: |
          $7z = "C:\Program Files\7-Zip\7z.exe"
          New-Item -Path "C:\GamingVM\Backups" -ItemType Directory -Force

          if (Test-Path "C:\MyApps") {
            & $7z a -t7z "C:\GamingVM\Backups\MyApps.7z" "C:\MyApps\*" -mx=3 -mmt=on -y
          }
          & $7z a -t7z "C:\GamingVM\Backups\AppData.7z" `
            "C:\Users\runneradmin\AppData\*" -mx=3 -mmt=on -y `
            -xr!"Temp" -xr!"Local\Temp" -xr!"cache" -xr!"Cache" `
            -xr!"Application Data" -xr!"History" -xr!"INetCache"

          & $7z a -t7z "C:\GamingVM\Backups\Desktop.7z" `
            "C:\Users\runneradmin\Desktop\*" -mx=3 -mmt=on -y

          & $7z a -t7z "C:\GamingVM\Backups\Documents.7z" `
            "C:\Users\runneradmin\Documents\*" -mx=3 -mmt=on -y

          Write-Host "======= Backup Sizes ======="
          Get-ChildItem "C:\GamingVM\Backups\" | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Host "$($_.Name) = $size MB"
          }
          Write-Host "============================"

      - name: 5. Upload Cache for Next Run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: C:\GamingVM
          key: gaming-vm-files-${{ github.run_number }}

      - name: 6. Auto-Restart Workflow
        if: always()
        shell: pwsh
        env:
          GH_TOKEN:      ${{ secrets.GH_TOKEN }}
          REPO:          ${{ github.repository }}
          WORKFLOW_FILE: vm.yml
          BRANCH:        main
        run: |
          $uri     = "https://api.github.com/repos/$env:REPO/actions/workflows/$env:WORKFLOW_FILE/dispatches"
          $headers = @{
            "Authorization" = "token $env:GH_TOKEN"
            "Accept"        = "application/vnd.github.v3+json"
          }
          $body = @{ ref = $env:BRANCH } | ConvertTo-Json
          try {
            Invoke-RestMethod -Uri $uri -Method POST -Headers $headers `
              -Body $body -ContentType "application/json"
            Write-Host "New run triggered!"
          } catch {
            Write-Host "Failed to trigger: $_"
          }
